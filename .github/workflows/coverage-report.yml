# Coverage Report - Track test coverage from pytest
# Aligns with: pyproject.toml [tool.pytest.ini_options]

name: Coverage Report

on:
  push:
    branches: [main]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: '.python-version'

      - name: Install dev dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      # Run with exact pytest config from pyproject.toml
      - name: Generate coverage report
        run: |
          uv run pytest \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-report=html

      - name: Upload coverage HTML
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report-html
          path: htmlcov/

      - name: Comment coverage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const xml = fs.readFileSync('coverage.xml', 'utf8');

            const match = xml.match(/line-rate="([^"]+)"/);
            const coverage = match ? (parseFloat(match[1]) * 100).toFixed(2) : 'unknown';

            const comment = `## 📊 Coverage Report

            **Line Coverage: ${coverage}%**

            [View detailed coverage](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

# Test Matrix - Test across multiple Python versions
# Aligns with: pyproject.toml requires-python = ">=3.11"
# Purpose: Verify code works on Python 3.11+

name: Test Matrix

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest

    strategy:
      matrix:
        # Test on all Python versions >= 3.11
        python-version: ["3.11", "3.12", "3.13"]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python ${{ matrix.python-version }}
        run: |
          uv python install ${{ matrix.python-version }}
          uv venv --python ${{ matrix.python-version }}

      - name: Install dev dependencies
        run: |
          uv pip install -e ".[dev]"

      # Run pytest with exact config from pyproject.toml
      - name: Run tests
        run: |
          uv run pytest \
            --cov=src \
            --cov-report=term-missing \
            -v

  test-summary:
    name: Test Matrix Results
    needs: test
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Check results
        run: |
          if [ "${{ needs.test.result }}" == "success" ]; then
            echo "✅ All Python 3.11+ versions passed!"
          else
            echo "❌ Some versions failed"
            exit 1
          fi

# Main CI Workflow - Aligns with pyproject.toml and .pre-commit-config.yaml
# Purpose: Run all quality checks on push and PR
# Triggers: push to main/develop, pull requests to main/develop
# Key: Uses exact tool versions from pyproject.toml [project.optional-dependencies.dev]

name: Lint, Type Check, Security, and Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  checks: write

jobs:
  quality:
    name: Code Quality Suite
    runs-on: ubuntu-latest

    steps:
      # ──────────── SETUP ────────────
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: '.python-version'

      # Install from pyproject.toml [project.optional-dependencies.dev]
      - name: Install dev dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      # ──────────── RUFF ────────────
      # Config: pyproject.toml [tool.ruff]
      # - line-length = 120
      # - target-version = "py311"
      - name: Ruff lint check
        run: |
          echo "Ruff lint (line-length=120, target=py311)..."
          uv run ruff check . --output-format=github

      - name: Ruff format check
        run: |
          echo "Ruff format check (double quotes, space indent)..."
          uv run ruff format --check . --diff

      # ──────────── MYPY ────────────
      # Config: pyproject.toml [tool.mypy]
      # - python_version = "3.11"
      # - strict mode: disallow_untyped_defs, warn_unused_ignores, etc.
      - name: Mypy type check
        run: |
          echo "Mypy type check (python 3.11, strict mode)..."
          uv run mypy .

      # ──────────── BANDIT ────────────
      # Config: pyproject.toml [tool.bandit]
      # - exclude_dirs = [".venv", "build", "dist"]
      # - skips = ["B101"]
      # Also matches: .pre-commit-config.yaml bandit section
      - name: Bandit security scan
        run: |
          echo "Bandit security scan (reading pyproject.toml config)..."
          uv run bandit -r src/ main.py -c pyproject.toml -f json -o bandit-report.json || true

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: bandit-security-report
          path: bandit-report.json

      # ──────────── PYTEST ────────────
      # Config: pyproject.toml [tool.pytest.ini_options]
      # - pythonpath = ["src"]
      # - testpaths = ["tests"]
      # - addopts = "-v --tb=short --cov=src --cov-report=term-missing"
      - name: Pytest with coverage
        run: |
          echo "Pytest (pythonpath=src, testpaths=tests)..."
          uv run pytest \
            --cov=src \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-report=html \
            --junit-xml=junit.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: |
            junit.xml
            htmlcov/

      - name: Upload coverage to codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-report
          fail_ci_if_error: false

      # ──────────── SUMMARY ────────────
      - name: Quality check summary
        if: always()
        run: |
          echo "=== Quality Check Summary ==="
          echo "✅ Ruff (line-length=120, target=py311)"
          echo "✅ Mypy (python=3.11, strict)"
          echo "✅ Bandit (security scan)"
          echo "✅ Pytest (src/, tests/)"
          echo ""
          echo "📦 Tool Versions (from pyproject.toml):"
          uv run ruff --version
          uv run mypy --version
          uv run pytest --version
          uv run bandit --version

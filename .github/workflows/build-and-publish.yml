# Build & Publish - Create distributions and publish to PyPI
# Aligns with: pyproject.toml [project] and [tool.hatch.build]

name: Build & Publish

on:
  release:
    types: [created, published]
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to PyPI?"
        required: true
        default: "false"
        type: choice
        options: ["true", "false"]

permissions:
  contents: read

jobs:
  build:
    name: Build Distribution
    runs-on: ubuntu-latest

    outputs:
      dist-files: ${{ steps.build.outputs.files }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version-file: '.python-version'

      - name: Install dev dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      # Build using pyproject.toml config
      - name: Build distribution
        id: build
        run: |
          echo "Building distributions..."
          uv run pip install build
          uv run python -m build

          echo "=== Built distributions ==="
          ls -lh dist/

          FILES=$(ls -1 dist/)
          echo "files=$FILES" >> $GITHUB_OUTPUT

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    if: |
      success() && (
        github.event_name == 'release' ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'true')
      )

    needs: build
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          name: python-package-distributions
          path: dist/

      - name: Validate distributions
        run: |
          echo "=== Validating distributions ==="
          ls -lh dist/

          FILE_COUNT=$(ls dist/ | wc -l)
          if [ "$FILE_COUNT" -ne 2 ]; then
            echo "❌ Expected 2 files, found $FILE_COUNT"
            exit 1
          fi
          echo "✅ Distributions validated"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://upload.pypi.org/legacy/

      - name: Upload to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v1
        with:
          files: dist/*
          generate_release_notes: true

      - name: Success summary
        run: |
          echo "✅ Published to PyPI!"
          echo "📦 https://pypi.org/project/${{ github.event.repository.name }}/"

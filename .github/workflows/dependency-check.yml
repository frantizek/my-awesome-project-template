# Check for outdated and vulnerable dependencies
# Triggers: Weekly schedule, manual trigger
# Purpose: Keep dependencies secure and up to date

name: Dependency Check

on:
  schedule:
    # Run weekly on Monday morning
    - cron: '0 10 * * 1'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: '.python-version'

      - name: Install dependencies
        run: |
          uv venv
          uv pip install -e ".[dev]"

      # Run uv audit (checks against OSV database)
      - name: Audit dependencies with uv
        run: |
          echo "=== Checking for vulnerable dependencies ==="
          uv audit || true

      # Run pip-audit (alternative/additional check)
      - name: Audit with pip-audit
        run: |
          echo "=== Running pip-audit ==="
          uv pip install pip-audit
          uv run pip-audit || true

      # Check for outdated packages
      - name: Check for outdated packages
        run: |
          echo "=== Checking for outdated packages ==="
          uv pip list --outdated || true

  # Optional: Create issues for security vulnerabilities
  report:
    needs: audit
    runs-on: ubuntu-latest
    if: failure()

    steps:
      - name: Create issue for vulnerabilities
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🔒 Security: Vulnerable dependencies detected',
              body: 'Dependency scan found vulnerabilities. Check the workflow run for details.',
              labels: ['security', 'dependencies']
            })
